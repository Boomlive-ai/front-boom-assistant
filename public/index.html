<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boom AI Assistant</title>

    <!-- Runs before anything else loads. Folder-style URLs need a "/" at the
         end, otherwise the browser looks for style.css and script.js one level
         too high and finds the wrong site. Must stay inline here — script.js is
         one of the files that fails to load in exactly this situation. -->
    <script>
      (function () {
        var p = location.pathname;
        // The "." check leaves real file names (e.g. /foo/index.html) alone.
        if (!p.endsWith('/') && !p.split('/').pop().includes('.')) {
          location.replace(p + '/' + location.search + location.hash);
        }
      })();
    </script>

    <!-- Paths here are relative on purpose — see README "Two addresses". -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-text">BOOM</span>
      </div>
      <nav class="topbar-nav">
        <a href="#">Home</a>
        <a href="#">AI Tools ▾</a>
        <a href="#">Logout</a>
        <span class="user">| Hi aditya</span>
      </nav>
    </header>

    <main class="page">
      <section class="card">
        <h1 class="page-title">Boom AI Assistant</h1>

        <form id="seo-form" class="seo-form" novalidate>
          <!-- Language -->
          <fieldset class="field">
            <legend>Select Language</legend>
            <div class="radio-row">
              <label><input type="radio" name="language" value="en" /> English</label>
              <label><input type="radio" name="language" value="hi" /> Hindi</label>
              <label><input type="radio" name="language" value="bn" checked /> Bangla</label>
            </div>
          </fieldset>

          <!-- Claim -->
          <fieldset class="field">
            <legend>Claim</legend>
            <textarea
              name="claim"
              rows="2"
              placeholder="A photograph shows a newly inaugurated bridge in Bihar collapsing within days of opening."
            ></textarea>
          </fieldset>

          <!-- Claim source -->
          <fieldset class="field">
            <legend>Claim Source</legend>
            <input
              type="text"
              name="claim_source"
              placeholder="@BiharUpdates24"
            />
          </fieldset>

          <!-- Verdict -->
          <fieldset class="field">
            <legend>Verdict</legend>
            <select name="verdict">
              <option value="False" selected>False</option>
              <option value="True">True</option>
              <option value="Misleading">Misleading</option>
              <option value="Partly False">Partly False</option>
              <option value="Unverified">Unverified</option>
            </select>
          </fieldset>

          <!-- Context -->
          <fieldset class="field">
            <legend>Context</legend>
            <textarea
              name="context"
              rows="4"
              placeholder="Where the claim appeared, how it spread, relevant background…"
            ></textarea>
          </fieldset>

          <!-- Facts and findings -->
          <fieldset class="field">
            <legend>Facts &amp; Findings</legend>
            <textarea
              name="facts_and_findings"
              rows="6"
              placeholder="Evidence gathered — reverse image search, expert quotes, official statements, artefacts…"
            ></textarea>
          </fieldset>

          <!-- Caption -->
          <fieldset class="field">
            <legend>Caption</legend>
            <textarea
              name="caption"
              rows="2"
              placeholder="The original social-media caption of the claim"
            ></textarea>
          </fieldset>

          <div class="two-col">
            <fieldset class="field">
              <legend>Claim URL</legend>
              <input
                type="url"
                name="claim_url"
                placeholder="https://x.com/…"
              />
            </fieldset>

            <fieldset class="field">
              <legend>Claim Date</legend>
              <input type="date" name="claim_date" />
            </fieldset>
          </div>

          <fieldset class="field">
            <legend>Article URL <span class="hint">(optional — leave blank if unpublished)</span></legend>
            <input
              type="url"
              name="article_url"
              placeholder="https://www.boomlive.in/…"
            />
          </fieldset>

          <div class="actions">
            <button type="submit" id="generate-btn" class="btn primary">
              <span class="btn-label">Generate</span>
              <span class="spinner" aria-hidden="true"></span>
            </button>
            <button type="reset" class="btn ghost">Reset</button>
          </div>
        </form>
      </section>

      <!-- Response area -->
      <section id="response-card" class="card response-card" hidden>
        <div class="response-head">
          <h2>Generated SEO Output</h2>
          <div class="head-actions">
            <span id="rating-pill" class="rating-pill"></span>
            <button type="button" id="copy-all" class="btn ghost small">Copy JSON</button>
          </div>
        </div>

        <div id="fields-container"></div>

        <p class="usage-line" id="usage-line"></p>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
